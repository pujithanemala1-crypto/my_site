<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Edu Guide</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Card */
        .card {
            background: white;
            width: 90%;
            max-width: 450px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Title */
        .card h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        /* Subtitle */
        .card p {
            text-align: center;
            font-size: 14px;
            color: #777;
        }

        /* Input */
        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        /* Success message */
        #msg {
            text-align: center;
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Give Your Feedback ⭐</h2>
        <p>We value your opinion</p>

        <input type="text" id="name" placeholder="Your Name">
        <input type="email" id="email" placeholder="Your Email">
        <textarea id="feedback" placeholder="Write your feedback..."></textarea>

        <button onclick="submitFeedback()">Submit</button>

        <div id="msg"></div>
    </div>

    <script>
        function submitFeedback() {
            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let feedback = document.getElementById("feedback").value;

            if (name == "" || email == "" || feedback == "") {
                document.getElementById("msg").style.color = "red";
                document.getElementById("msg").innerText = "Please fill all fields!";
                return;
            }

            document.getElementById("msg").style.color = "green";
            document.getElementById("msg").innerText = "Thank you for your feedback! 🎉";

            // clear fields
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            document.getElementById("feedback").value = "";
        }
    </script>

</body>

</html>
